name: Code Coverage
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: nightly
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/cache-cargo-install-action@v3
        with:
          tool: cargo-llvm-cov
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            . -> target
      - name: Run cargo-llvm-cov for macros crate
        run: |
          cargo llvm-cov -p strict-num-extended-macros \
            --all-features --doctests \
            --lcov --output-path macro-source.lcov \
            --ignore-filename-regex="target/"
      - name: Run cargo-llvm-cov for library crate
        run: |
          cargo llvm-cov -p strict-num-extended \
            --all-features --doctests \
            --lcov --output-path lib.lcov \
            --ignore-filename-regex="target/"
      - name: Debug lcov contents
        run: |
          echo "=== macro-source.lcov SF lines ==="
          grep '^SF:' macro-source.lcov || echo "(none)"
          echo ""
          echo "=== macro-source.lcov line counts ==="
          grep -c '^DA:' macro-source.lcov || echo "0"
          echo ""
          echo "=== lib.lcov SF lines ==="
          grep '^SF:' lib.lcov || echo "(none)"
          echo ""
          echo "=== lib.lcov line counts ==="
          grep -c '^DA:' lib.lcov || echo "0"
          echo ""
          echo "=== lib.lcov full content (first 200 lines) ==="
          head -200 lib.lcov
      - name: Upload macro-source coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./macro-source.lcov
          flags: macro-source
          verbose: true
          fail_ci_if_error: true
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload lib coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./lib.lcov
          flags: lib
          verbose: true
          fail_ci_if_error: true
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
