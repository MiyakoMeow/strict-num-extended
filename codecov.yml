codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 5%

flags:
  generated-code:
    paths:
      - "macros/src/**/*.rs"
    carryforward: true

ignore:
  - "target/"
  - "tests/"
